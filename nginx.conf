server {
    listen 80;
    server_name portal.kyu.ac.ug; # Replace with university domain or IP

    # Redirect all HTTP to HTTPS for camera streams security
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name portal.kyu.ac.ug; # Replace with university domain or IP

    # SSL Certificates (Managed by Certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/portal.kyu.ac.ug/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.kyu.ac.ug/privkey.pem;

    # Optimal SSL configs
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    # Support high payload sizes for PDFs and biometric crops
    client_max_body_size 15M;

    # Static asset caching (biometric weights files cached at Nginx layer)
    location /models/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
